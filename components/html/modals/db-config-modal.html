<!-- ========== DATABASE CONFIG MODAL ========== -->
<div class="modal-overlay db-config-overlay" id="dbConfigModal">
  <div class="modal-card" style="width:480px;">

    <div class="modal-header" style="background:var(--primary);border-radius:16px 16px 0 0;">
      <div class="modal-title" style="color:#fff;">
        <i class="bi bi-database-gear" style="color:#fff;font-size:18px;"></i>
        ตั้งค่าการเชื่อมต่อฐานข้อมูล
      </div>
    </div>

    <div class="modal-body" style="padding:24px;">

      <!-- IT notice banner -->
      <div class="db-config-notice">
        <div style="display:flex;align-items:flex-start;gap:12px;">
          <i class="bi bi-exclamation-triangle-fill" style="font-size:20px;color:#d97706;flex-shrink:0;margin-top:2px;"></i>
          <div>
            <div style="font-weight:700;font-size:14px;color:#92400e;margin-bottom:4px;">ไม่สามารถเชื่อมต่อฐานข้อมูลได้</div>
            <div style="font-size:13px;color:#78350f;line-height:1.6;">
              กรุณาติดต่อแผนก IT เพื่อดำเนินการแก้ไขและตั้งค่าการเชื่อมต่อ<br/>
              <span style="font-weight:600;">📞 โทร: 123</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Status message -->
      <div id="dbConfigStatus" style="display:none;margin-bottom:16px;padding:10px 14px;border-radius:8px;font-size:13px;font-weight:500;"></div>

      <!-- Form -->
      <div style="display:grid;gap:14px;">

        <div style="display:grid;grid-template-columns:1fr auto;gap:10px;align-items:end;">
          <div>
            <label class="db-config-label">ที่อยู่เซิร์ฟเวอร์ (IP / Hostname)</label>
            <input type="text" id="dbConfigHost" class="db-config-input"
              placeholder="เช่น 192.168.1.100 หรือ localhost"
              autocomplete="off" spellcheck="false" />
          </div>
          <div style="width:90px;">
            <label class="db-config-label">พอร์ต</label>
            <input type="number" id="dbConfigPort" class="db-config-input"
              placeholder="3306" value="3306" min="1" max="65535" />
          </div>
        </div>

        <div>
          <label class="db-config-label">ชื่อผู้ใช้ฐานข้อมูล (User)</label>
          <input type="text" id="dbConfigUser" class="db-config-input"
            placeholder="เช่น root"
            autocomplete="off" spellcheck="false" />
        </div>

        <div>
          <label class="db-config-label">รหัสผ่านฐานข้อมูล (Password)</label>
          <div style="position:relative;">
            <input type="password" id="dbConfigPassword" class="db-config-input"
              style="padding-right:42px;"
              placeholder="กรอกรหัสผ่าน (เว้นว่างหากไม่มี)"
              autocomplete="new-password" />
            <button type="button" onclick="dbConfigTogglePassword()"
              style="position:absolute;right:10px;top:50%;transform:translateY(-50%);
                background:none;border:none;cursor:pointer;color:var(--gray-500);padding:4px;">
              <i class="bi bi-eye" id="dbConfigPasswordEyeIcon"></i>
            </button>
          </div>
        </div>

        <div>
          <label class="db-config-label">ชื่อฐานข้อมูล (Database Name)</label>
          <input type="text" id="dbConfigDatabase" class="db-config-input"
            placeholder="เช่น training_v_1_1"
            autocomplete="off" spellcheck="false" />
        </div>

      </div>
    </div>

    <div class="modal-footer" style="padding:16px 24px;gap:10px;">
      <button class="btn-outline-custom" id="dbConfigTestBtn" onclick="dbConfigTest()">
        <i class="bi bi-plug"></i> ทดสอบการเชื่อมต่อ
      </button>
      <button class="btn-primary-custom" id="dbConfigSaveBtn" onclick="dbConfigSave()">
        <i class="bi bi-check-lg"></i> บันทึกและเชื่อมต่อ
      </button>
    </div>

  </div>
</div>
