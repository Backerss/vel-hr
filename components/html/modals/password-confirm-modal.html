<!-- ========== PASSWORD CONFIRM MODAL ========== -->
<div class="modal-overlay" id="passwordConfirmModal">
  <div class="modal-card" style="width:400px;">
    <div class="modal-header">
      <div class="modal-title">
        <i class="bi bi-shield-lock-fill" id="pwdConfirmTitleIcon" style="color:var(--danger);"></i>
        <span id="pwdConfirmTitle" style="color:var(--danger);">ยืนยันตัวตนก่อนลบข้อมูล</span>
      </div>
      <button class="modal-close" onclick="closePasswordConfirmModal()">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
    <div class="modal-body">
      <div id="pwdConfirmWarningBox" style="display:flex;align-items:center;gap:10px;background:var(--danger-light);border-radius:10px;padding:12px 14px;margin-bottom:18px;">
        <i id="pwdConfirmWarningIcon" class="bi bi-exclamation-triangle-fill" style="color:var(--danger);font-size:18px;flex-shrink:0;"></i>
        <span id="pwdConfirmMessage" style="font-size:13px;color:#b91c1c;">การลบข้อมูลนี้ไม่สามารถย้อนกลับได้ กรุณากรอกรหัสผ่านเพื่อยืนยัน</span>
      </div>
      <div class="form-group">
        <label>รหัสผ่านของ <strong id="pwdConfirmUsername"></strong></label>
        <div style="position:relative;">
          <input type="password" id="pwdConfirmInput" class="form-control-m"
            placeholder="กรอกรหัสผ่านของคุณ"
            onkeydown="if(event.key==='Enter') submitPasswordConfirm()"
            style="padding-right:42px;" />
          <button type="button"
            style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--gray-400);font-size:16px;padding:2px;"
            onmousedown="document.getElementById('pwdConfirmInput').type='text'"
            onmouseup="document.getElementById('pwdConfirmInput').type='password'"
            onmouseleave="document.getElementById('pwdConfirmInput').type='password'"
            tabindex="-1">
            <i class="bi bi-eye"></i>
          </button>
        </div>
        <div id="pwdConfirmError" style="font-size:12.5px;color:var(--danger);margin-top:6px;min-height:18px;"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-outline-custom" onclick="closePasswordConfirmModal()">ยกเลิก</button>
      <button class="btn-primary-custom" id="btnPasswordConfirm"
        style="background:var(--danger);border-color:var(--danger);"
        onclick="submitPasswordConfirm()">
        <i class="bi bi-shield-check"></i> <span id="pwdConfirmBtnLabel">ยืนยันการลบ</span>
      </button>
    </div>
  </div>
</div>
