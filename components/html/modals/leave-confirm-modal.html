<!-- ========== LEAVE CONFIRM DELETE MODAL ========== -->
<div class="modal-overlay" id="leaveConfirmModal">
  <div class="modal-card" style="width:400px;">
    <div class="modal-body">
      <div class="confirm-content">
        <div class="confirm-icon">
          <i class="bi bi-trash3-fill"></i>
        </div>
        <div class="confirm-title">ยืนยันการลบ</div>
        <div class="confirm-text" id="leaveConfirmText">คุณต้องการลบข้อมูลการลานี้ใช่หรือไม่?</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-outline-custom" onclick="closeModal('leaveConfirmModal')">ยกเลิก</button>
      <button class="btn-primary-custom" style="background:var(--danger);" id="btnConfirmDeleteLeave" onclick="executeDeleteLeave()">
        <i class="bi bi-trash3"></i> ลบข้อมูล
      </button>
    </div>
  </div>
</div>
