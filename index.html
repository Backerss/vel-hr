<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR Management System</title>
  <meta name="description" content="ระบบบริหารจัดการทรัพยากรบุคคล - HR Management System" />

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <!-- App Styles -->
  <link rel="stylesheet" href="./components/css/app.css" />
</head>
<body>

  <!-- ========== LOGIN OVERLAY (injected by renderer) ========== -->
  <div id="loginSlot"></div>

  <!-- ========== MAIN APP ========== -->
  <div id="app">

    <!-- Sidebar (injected by renderer) -->
    <div id="sidebarSlot"></div>

    <!-- Main Content -->
    <div class="main-content">

      <!-- Topbar (injected by renderer) -->
      <div id="topbarSlot"></div>

      <!-- Page Content (dynamic, switched by JS) -->
      <div class="page-content" id="pageContent">
        <!-- Loaded dynamically by switchPage() -->
      </div>

    </div>
  </div>

  <!-- ========== MODALS (injected by renderer) ========== -->
  <div id="modalsSlot"></div>

  <!-- ========== TOAST CONTAINER ========== -->
  <div id="toastContainer"></div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- App Entry Point (ES Module) -->
  <script type="module" src="renderer.js"></script>
</body>
</html>
